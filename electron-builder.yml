appId: studio.greyrock.lodestone
productName: Lodestone
copyright: Copyright © 2026 Greyrock Studio

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - node_modules/**/*

asarUnpack:
  - node_modules/better-sqlite3/**/*

extraResources:
  - from: engine
    to: engine
    filter:
      - '**/*'
      - '!**/node_modules/.cache'
      - '!**/*.ts'
      - '!**/tsconfig.tsbuildinfo'

mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - nsis
    - portable
  icon: build/icon.ico

linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Office

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  owner: GreyrockStudios
  repo: lodestone-desktop

releaseInfo:
  releaseName: Lodestone Desktop v0.1.0