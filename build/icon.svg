<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Lodestone crystal shape — a hexagonal gem -->
  <g transform="translate(256, 256)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="140" fill="url(#stone)" opacity="0.1"/>
    <!-- Crystal facets -->
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60" fill="url(#stone)" opacity="0.9"/>
    <polygon points="0,-120 104,-60 0,0" fill="#fff" opacity="0.15"/>
    <polygon points="104,-60 104,60 0,0" fill="#000" opacity="0.1"/>
    <polygon points="104,60 0,120 0,0" fill="#000" opacity="0.15"/>
    <polygon points="0,120 -104,60 0,0" fill="#000" opacity="0.2"/>
    <polygon points="-104,60 -104,-60 0,0" fill="#fff" opacity="0.05"/>
    <!-- Inner highlight -->
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="#fff" opacity="0.08"/>
  </g>
</svg>
