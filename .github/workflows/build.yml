name: Build & Deploy Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_mac:
        description: 'Build macOS'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      build_win:
        description: 'Build Windows'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '20'

jobs:
  # ── Determine version ──────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_prerelease: ${{ steps.ver.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION=$(jq -r .version package.json)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"alpha"* || "$VERSION" == *"beta"* || "$VERSION" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Building version: $VERSION"

  # ── Build macOS ────────────────────────────────────────────────────
  build-mac:
    needs: [version]
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_mac == 'true' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3

      - name: Build macOS (arm64 DMG, unsigned)
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.blockmap
            dist/latest-mac.yml
          retention-days: 1

  # ── Build Windows ──────────────────────────────────────────────────
  build-win:
    needs: [version]
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_win == 'true' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3

      - name: Build Windows x64 (unsigned)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows arm64 (unsigned)
        run: npx electron-builder --win --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          retention-days: 1

  # ── Deploy & Release ──────────────────────────────────────────────
  deploy:
    needs: [version, build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy macOS to server
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" mac-build/latest-mac.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/lodestone/updates/
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" mac-build/*.dmg ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/lodestone/updates/
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" mac-build/*.blockmap ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/lodestone/updates/
          # Copy DMG to downloads directory
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cp /var/www/lodestone/updates/*.dmg /var/www/lodestone/downloads/ 2>/dev/null || true"

      - name: Deploy Windows to server
        run: |
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" win-build/latest.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/lodestone/updates/
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" win-build/*.exe ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/lodestone/updates/
          rsync -avz -e "ssh -i ~/.ssh/deploy_key" win-build/*.blockmap ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/lodestone/updates/

      - name: Fix permissions
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "find /var/www/lodestone/ -type d -exec chmod 755 {} \; && find /var/www/lodestone/ -type f -exec chmod 644 {} \;"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
          files: |
            mac-build/*.dmg
            mac-build/*.blockmap
            mac-build/latest-mac.yml
            win-build/*.exe
            win-build/*.blockmap
            win-build/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}