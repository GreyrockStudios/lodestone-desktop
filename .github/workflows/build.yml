name: Build Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3
      - run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload macOS build to release
        run: |
          gh release upload v0.5.52 dist/*.dmg dist/*.blockmap dist/latest-mac.yml --clobber || true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3
      - run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx electron-builder --win --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Windows build to release
        shell: bash
        run: |
          gh release upload v0.5.52 dist/*.exe dist/*.blockmap dist/latest.yml --clobber || true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}