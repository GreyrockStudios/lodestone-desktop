name: Build & Release Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_mac:
        description: 'Build macOS'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      build_win:
        description: 'Build Windows'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      deploy_to_server:
        description: 'Deploy to update server'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '20'

jobs:
  # ── Determine version ──────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_prerelease: ${{ steps.ver.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION=$(jq -r .version package.json)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"alpha"* || "$VERSION" == *"beta"* || "$VERSION" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Building version: $VERSION"

  # ── Pull UI from production ─────────────────────────────────────────
  pull-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Download production UI
        run: |
          mkdir -p ui/assets
          # Download the built web app from production
          curl -sL https://heylodestone.com/ -o ui/index.html
          # Download support page
          curl -sL https://heylodestone.com/support.html -o ui/support.html 2>/dev/null || true
          # Download manifest and icons
          curl -sL https://heylodestone.com/manifest.json -o ui/manifest.json 2>/dev/null || true
          curl -sL https://heylodestone.com/og-image.png -o ui/og-image.png 2>/dev/null || true
          curl -sL https://heylodestone.com/favicon.ico -o ui/favicon.ico 2>/dev/null || true
          curl -sL https://heylodestone.com/icon.png -o ui/icon.png 2>/dev/null || true
          # Download ALL assets referenced in index.html (JS, CSS, modulepreload)
          grep -oE 'assets/[A-Za-z0-9_.-]+' ui/index.html | sort -u | while read asset; do
            echo "Downloading $asset..."
            curl -sL "https://heylodestone.com/$asset" -o "ui/$asset"
          done
          # Download the main JS bundle to parse for lazy-loaded chunks
          MAIN_JS=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' ui/index.html | head -1)
          if [ -n "$MAIN_JS" ]; then
            curl -sL "https://heylodestone.com/$MAIN_JS" -o "ui/$MAIN_JS"
            # Extract ALL lazy-loaded chunk references from the main JS
            grep -oE 'assets/[A-Za-z0-9_.-]+\.(js|css)' "ui/$MAIN_JS" | sort -u | while read chunk; do
              if [ ! -f "ui/$chunk" ]; then
                echo "Downloading lazy chunk: $chunk"
                curl -sL "https://heylodestone.com/$chunk" -o "ui/$chunk"
              fi
            done
            # Also extract font references
            grep -oE 'assets/[A-Za-z0-9_.-]+\.(woff2?|ttf)' "ui/$MAIN_JS" | sort -u | while read font; do
              if [ ! -f "ui/$font" ]; then
                echo "Downloading font: $font"
                curl -sL "https://heylodestone.com/$font" -o "ui/$font"
              fi
            done
          fi
          # Download CSS-referenced assets (fonts, images)
          for css in ui/assets/*.css; do
            if [ -f "$css" ]; then
              grep -oE 'assets/[A-Za-z0-9_.-]+\.(woff2?|ttf|png|svg)' "$css" | sort -u | while read asset; do
                if [ ! -f "ui/$asset" ]; then
                  echo "Downloading CSS asset: $asset"
                  curl -sL "https://heylodestone.com/$asset" -o "ui/$asset"
                fi
              done
            fi
          done
          # Count what we got
          echo "=== Downloaded files ==="
          find ui/ -type f | wc -l
          find ui/assets/ -type f | wc -l

      - name: Upload UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-assets
          path: ui/

  # ── Build macOS (arm64 only — universal fails with better-sqlite3) ───
  build-mac:
    needs: [version, pull-ui]
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_mac == 'true' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Download UI assets
        uses: actions/download-artifact@v4
        with:
          name: ui-assets
          path: ui/

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3

      - name: Build macOS (arm64 DMG, unsigned)
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.blockmap
            dist/latest-mac.yml

  # ── Build Windows (x64 + arm64) ──────────────────────────────────────
  build-win:
    needs: [version, pull-ui]
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_win == 'true' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Download UI assets
        uses: actions/download-artifact@v4
        with:
          name: ui-assets
          path: ui/

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3

      # Build x64 first (majority of Windows users)
      - name: Build Windows x64 (unsigned)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Then arm64 (Windows on ARM devices)
      - name: Build Windows arm64 (unsigned)
        run: npx electron-builder --win --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  # ── Release & Deploy ──────────────────────────────────────────────
  release:
    needs: [version, build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate update manifests
        id: manifest
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          # Find files
          DMG=$(find mac-build -name "*.dmg" -type f | head -1)
          EXE_X64=$(find win-build -name "*-x64.exe" -type f | head -1)
          EXE_ARM64=$(find win-build -name "*-arm64.exe" -type f | head -1)

          # macOS manifest (latest-mac.yml)
          # electron-builder generates this, but let's verify it exists
          if [ -f "mac-build/latest-mac.yml" ]; then
            cp mac-build/latest-mac.yml latest-mac.yml
            echo "Using electron-builder's latest-mac.yml"
          elif [ -n "$DMG" ]; then
            DMG_SHA=$(sha512sum "$DMG" | awk '{print $1}')
            DMG_SIZE=$(stat -c%s "$DMG")
            DMG_NAME=$(basename "$DMG")
            cat > latest-mac.yml << EOF
          version: ${VERSION}
          files:
            - url: ${DMG_NAME}
              sha512: ${DMG_SHA}
              size: ${DMG_SIZE}
          path: ${DMG_NAME}
          sha512: ${DMG_SHA}
          releaseDate: '${DATE}'
          EOF
          fi

          # Windows manifest (latest.yml)
          # Use electron-builder's generated latest.yml as base, or generate manually
          if [ -f "win-build/latest.yml" ]; then
            cp win-build/latest.yml latest.yml
            echo "Using electron-builder's latest.yml"
          else
            # Fallback: generate from x64 exe (primary platform)
            if [ -n "$EXE_X64" ]; then
              EXE_SHA=$(sha512sum "$EXE_X64" | awk '{print $1}')
              EXE_SIZE=$(stat -c%s "$EXE_X64")
              EXE_NAME=$(basename "$EXE_X64")
              cat > latest.yml << EOF
          version: ${VERSION}
          files:
            - url: ${EXE_NAME}
              sha512: ${EXE_SHA}
              size: ${EXE_SIZE}
          path: ${EXE_NAME}
          sha512: ${EXE_SHA}
          releaseDate: '${DATE}'
          EOF
            fi
          fi

          echo "--- latest-mac.yml ---"
          cat latest-mac.yml
          echo "--- latest.yml ---"
          cat latest.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
          files: |
            mac-build/*.dmg
            mac-build/*.blockmap
            win-build/*.exe
            win-build/*.blockmap
            latest-mac.yml
            latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Deploy to update server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            VERSION="${{ needs.version.outputs.version }}"
            cd /var/www/lodestone/updates

            # Download from GitHub Release
            DMG_URL=$(curl -sL "https://api.github.com/repos/GreyrockStudios/lodestone-desktop/releases/tags/v${VERSION}" | jq -r '.assets[] | select(.name | endswith(".dmg")) | .browser_download_url' | head -1)
            EXE_URLS=$(curl -sL "https://api.github.com/repos/GreyrockStudios/lodestone-desktop/releases/tags/v${VERSION}" | jq -r '.assets[] | select(.name | endswith(".exe")) | .browser_download_url')

            [ -n "$DMG_URL" ] && curl -sL "$DMG_URL" -O
            for URL in $EXE_URLS; do
              curl -sL "$URL" -O
            done

            # Copy DMG to downloads directory
            cp *.dmg /var/www/lodestone/downloads/ 2>/dev/null || true

            # Fix permissions
            find /var/www/lodestone/ -type d -exec chmod 755 {} \;
            find /var/www/lodestone/ -type f -exec chmod 644 {} \;

      - name: Deploy manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "latest-mac.yml,latest.yml"
          target: /var/www/lodestone/updates

  # ── Manual Deploy (workflow_dispatch with deploy_to_server) ────────
  deploy-manual:
    needs: [version, build-mac, build-win]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_server == 'true'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Deploy to update server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "mac-build/*.dmg,mac-build/*.blockmap,win-build/*.exe,win-build/*.blockmap"
          target: /var/www/lodestone/updates