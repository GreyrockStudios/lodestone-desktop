name: Build & Deploy Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_mac:
        description: 'Build macOS'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      build_win:
        description: 'Build Windows'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '20'

jobs:
  # ── Determine version ──────────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_prerelease: ${{ steps.ver.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION=$(jq -r .version package.json)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *"alpha"* || "$VERSION" == *"beta"* || "$VERSION" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Building version: $VERSION"

  # ── Build macOS ────────────────────────────────────────────────────
  build-mac:
    needs: [version]
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_mac == 'true' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Pull UI from production
        run: |
          mkdir -p ui/assets
          curl -sfL https://heylodestone.com/ -o ui/index.html
          curl -sfL https://heylodestone.com/support.html -o ui/support.html || true
          curl -sfL https://heylodestone.com/manifest.json -o ui/manifest.json || true
          curl -sfL https://heylodestone.com/og-image.png -o ui/og-image.png || true
          curl -sfL https://heylodestone.com/favicon.ico -o ui/favicon.ico || true
          curl -sfL https://heylodestone.com/icon.png -o ui/icon.png || true
          grep -oE 'assets/[A-Za-z0-9_.-]+' ui/index.html | sort -u | while read -r asset; do
            curl -sfL "https://heylodestone.com/$asset" -o "ui/$asset" || true
          done
          MAIN_JS=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' ui/index.html | head -1 || true)
          if [ -n "$MAIN_JS" ]; then
            curl -sfL "https://heylodestone.com/$MAIN_JS" -o "ui/$MAIN_JS" || true
            grep -oE 'assets/[A-Za-z0-9_.-]+\.(js|css)' "ui/$MAIN_JS" 2>/dev/null | sort -u | while read -r chunk; do
              [ -f "ui/$chunk" ] || curl -sfL "https://heylodestone.com/$chunk" -o "ui/$chunk" || true
            done
            grep -oE 'assets/[A-Za-z0-9_.-]+\.(woff2?|ttf)' "ui/$MAIN_JS" 2>/dev/null | sort -u | while read -r font; do
              [ -f "ui/$font" ] || curl -sfL "https://heylodestone.com/$font" -o "ui/$font" || true
            done
          fi
          for css in ui/assets/*.css; do
            [ -f "$css" ] || continue
            grep -oE 'assets/[A-Za-z0-9_.-]+\.(woff2?|ttf|png|svg)' "$css" 2>/dev/null | sort -u | while read -r asset; do
              [ -f "ui/$asset" ] || curl -sfL "https://heylodestone.com/$asset" -o "ui/$asset" || true
            done
          done
          FILE_COUNT=$(find ui/ -type f | wc -l | tr -d ' ')
          echo "Downloaded $FILE_COUNT UI files"
          [ "$FILE_COUNT" -gt 5 ] || { echo "Too few UI files downloaded ($FILE_COUNT)"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3

      - name: Build macOS (arm64 DMG, unsigned)
        run: npx electron-builder --mac
        env:
          GH_TOKEN: *** secrets.GITHUB_TOKEN }}

      - name: Deploy macOS to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/latest-mac.yml,dist/*.dmg,dist/*.blockmap"
          target: /var/www/lodestone/updates
          strip_components: 1

      - name: Copy DMG and fix permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cp /var/www/lodestone/updates/*.dmg /var/www/lodestone/downloads/ 2>/dev/null || true
            find /var/www/lodestone/ -type d -exec chmod 755 {} \;
            find /var/www/lodestone/ -type f -exec chmod 644 {} \;

  # ── Build Windows ──────────────────────────────────────────────────
  build-win:
    needs: [version]
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_win == 'true' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Pull UI from production
        shell: bash
        run: |
          mkdir -p ui/assets
          curl -sfL https://heylodestone.com/ -o ui/index.html
          curl -sfL https://heylodestone.com/support.html -o ui/support.html || true
          curl -sfL https://heylodestone.com/manifest.json -o ui/manifest.json || true
          curl -sfL https://heylodestone.com/og-image.png -o ui/og-image.png || true
          curl -sfL https://heylodestone.com/favicon.ico -o ui/favicon.ico || true
          curl -sfL https://heylodestone.com/icon.png -o ui/icon.png || true
          grep -oE 'assets/[A-Za-z0-9_.-]+' ui/index.html | sort -u | while read -r asset; do
            curl -sfL "https://heylodestone.com/$asset" -o "ui/$asset" || true
          done
          MAIN_JS=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' ui/index.html | head -1 || true)
          if [ -n "$MAIN_JS" ]; then
            curl -sfL "https://heylodestone.com/$MAIN_JS" -o "ui/$MAIN_JS" || true
            grep -oE 'assets/[A-Za-z0-9_.-]+\.(js|css)' "ui/$MAIN_JS" 2>/dev/null | sort -u | while read -r chunk; do
              [ -f "ui/$chunk" ] || curl -sfL "https://heylodestone.com/$chunk" -o "ui/$chunk" || true
            done
            grep -oE 'assets/[A-Za-z0-9_.-]+\.(woff2?|ttf)' "ui/$MAIN_JS" 2>/dev/null | sort -u | while read -r font; do
              [ -f "ui/$font" ] || curl -sfL "https://heylodestone.com/$font" -o "ui/$font" || true
            done
          fi
          for css in ui/assets/*.css; do
            [ -f "$css" ] || continue
            grep -oE 'assets/[A-Za-z0-9_.-]+\.(woff2?|ttf|png|svg)' "$css" 2>/dev/null | sort -u | while read -r asset; do
              [ -f "ui/$asset" ] || curl -sfL "https://heylodestone.com/$asset" -o "ui/$asset" || true
            done
          done
          FILE_COUNT=$(find ui/ -type f | wc -l | tr -d ' ')
          echo "Downloaded $FILE_COUNT UI files"
          [ "$FILE_COUNT" -gt 5 ] || { echo "Too few UI files downloaded ($FILE_COUNT)"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3

      - name: Build Windows x64 (unsigned)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: *** secrets.GITHUB_TOKEN }}

      - name: Build Windows arm64 (unsigned)
        run: npx electron-builder --win --arm64
        env:
          GH_TOKEN: *** secrets.GITHUB_TOKEN }}

      - name: Deploy Windows to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/latest.yml,dist/*.exe,dist/*.blockmap"
          target: /var/www/lodestone/updates
          strip_components: 1

      - name: Fix permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            find /var/www/lodestone/ -type d -exec chmod 755 {} \;
            find /var/www/lodestone/ -type f -exec chmod 644 {} \;

  # ── Create GitHub Release ──────────────────────────────────────────
  release:
    needs: [version, build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download release files from server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /tmp/release-assets
            cp /var/www/lodestone/updates/latest-mac.yml /tmp/release-assets/
            cp /var/www/lodestone/updates/latest.yml /tmp/release-assets/
            cp /var/www/lodestone/updates/*.dmg /tmp/release-assets/ 2>/dev/null || true
            cp /var/www/lodestone/updates/*.exe /tmp/release-assets/ 2>/dev/null || true
            cp /var/www/lodestone/updates/*.blockmap /tmp/release-assets/ 2>/dev/null || true
            ls -la /tmp/release-assets/

      - name: Fetch release files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "/tmp/release-assets/*"
          target: release-assets
          strip_components: 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: *** secrets.RELEASE_TOKEN }}