name: Build & Deploy Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_mac:
        description: 'Build macOS'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      build_win:
        description: 'Build Windows'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '20'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_prerelease: ${{ steps.ver.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: ver
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION=$(jq -r .version package.json)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$([[ "$VERSION" == *"alpha"* || "$VERSION" == *"beta"* || "$VERSION" == *"rc"* ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

  build-mac:
    needs: [version]
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_mac == 'true' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3
      - run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup SSH and deploy macOS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz -e "ssh" dist/latest-mac.yml dist/*.dmg dist/*.blockmap ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/lodestone/updates/
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cp /var/www/lodestone/updates/*.dmg /var/www/lodestone/downloads/ 2>/dev/null || true; find /var/www/lodestone/ -type d -exec chmod 755 {} \; ; find /var/www/lodestone/ -type f -exec chmod 644 {} \;"
      - name: Upload artifacts for release job
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.blockmap
            dist/latest-mac.yml
          retention-days: 1
        continue-on-error: true

  build-win:
    needs: [version]
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_win == 'true' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3
      - run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx electron-builder --win --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup SSH and deploy Windows
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          scp dist/latest.yml dist/*.exe dist/*.blockmap ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/lodestone/updates/
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "find /var/www/lodestone/ -type d -exec chmod 755 {} \; ; find /var/www/lodestone/ -type f -exec chmod 644 {} \;"
      - name: Upload artifacts for release job
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          retention-days: 1
        continue-on-error: true

  release:
    needs: [version, build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ needs.version.outputs.is_prerelease == 'true' }}
          files: |
            mac-build/*.dmg
            mac-build/*.blockmap
            mac-build/latest-mac.yml
            win-build/*.exe
            win-build/*.blockmap
            win-build/latest.yml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}