name: Build Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  NODE_VERSION: '20'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3
      - run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: List dist contents
        run: ls -la dist/ || true
      - name: Upload macOS build to release
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Uploading to release $TAG"
          ls -la dist/*.dmg dist/*.blockmap dist/latest-mac.yml 2>&1 || true
          gh release upload "$TAG" dist/*.dmg dist/*.blockmap dist/latest-mac.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx @electron/rebuild -v 43.1.0 -w better-sqlite3
      - run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npx electron-builder --win --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: List dist contents
        shell: bash
        run: ls -la dist/ || true
      - name: Upload Windows build to release
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Uploading to release $TAG"
          ls -la dist/*.exe dist/*.blockmap dist/latest.yml 2>&1 || true
          gh release upload "$TAG" dist/*.exe dist/*.blockmap dist/latest.yml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}